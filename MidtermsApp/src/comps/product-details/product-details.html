<div class="modal-content shadow">
    <div class="modal-header bg-primary text-white">
      <h5 class="modal-title">Edit: {{ product?.name }}</h5>
    </div>
    
    <div class="modal-body">
      <div class="mb-3">
        <label class="form-label fw-bold">Product Name</label>
        <input type="text" [(ngModel)]="product.name" class="form-control">
      </div>
  
      <div class="mb-3">
        <label class="form-label fw-bold">Price ($)</label>
        <input type="number" [(ngModel)]="product.price" class="form-control">
      </div>
    </div>
  
    <div class="modal-footer">
      <button class="btn btn-secondary" [routerLink]="['/product-list']">Close</button>
    </div>
  </div>
